# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Stage 5 interview may
# verify these declarations against the code; be ready to explain any design
# choice (the weights in config.py, the honeypot heuristics, the feature
# blocks) in your own words.
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Anthropic) throughout development: to design the scoring
  architecture (six interpretable signal blocks: skill credibility,
  experience/seniority fit, JD negative-list, location/logistics, behavioral
  availability, production-language credibility), to write the feature
  extraction and ranking code, and to generate the explanatory deck content.
  All design choices — keyword taxonomies, scoring weights, honeypot
  heuristics, and the overall pipeline architecture — were reviewed,
  reasoned through, and validated by me, including running the ranker
  against the released candidate pool, checking the output distribution
  (title relevance, experience-band fit, location mix, honeypot rate) for
  sanity, and validating the submission format against the organizers'
  validate_submission.py. No candidate data was sent to any AI tool —
  this is a feature-engineered, CPU-only ranker, not an LLM-based one;
  Claude was used as a development tool, not as part of the ranking
  pipeline itself.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Feature-engineered ranker, no LLM calls during ranking (CPU-only, ~67s
  for 100K candidates). Six interpretable signal blocks, each traceable to
  a specific JD clause: (1) core skill match — embeddings/vector-DB/ranking-
  eval/LLM evidence, trust-weighted by whether the skill is corroborated in
  career-history narrative + nonzero duration/endorsements, not just listed
  as a tag (this is the direct counter to the keyword-stuffing trap); (2)
  experience & seniority fit — soft Gaussian around the 5-9y band plus
  title-chaser and research-only/architecture-only detectors drawn from the
  JD's explicit disqualifiers; (3) domain negative-list — consulting-only,
  CV/speech/robotics-only, recent-LangChain-wrapper-only penalties, each
  with the JD's own escape clauses encoded; (4) location & logistics — city
  tier, relocation willingness, notice period (no visa sponsorship per JD);
  (5) behavioral availability — Redrob signals (recency, response rate,
  interview completion, offer acceptance, verification) as a modifier, not
  a replacement, for topical fit; (6) credibility modifier — production
  language vs. tutorial language in career history. A 20K-feature TF-IDF
  cosine-similarity signal against the JD text is blended in at 30% weight
  within the skill block to catch real but unenumerated synonyms. A
  best-effort honeypot screen (skill-claim-vs-duration impossibility,
  career-months-vs-YOE impossibility, overlapping concurrent roles, invalid
  education years) removes numerically-impossible profiles before ranking;
  0% honeypots appeared in the final top 100. Every reasoning string is
  generated from the same fields used for scoring, so nothing in it can
  hallucinate a skill or contradict the rank.

